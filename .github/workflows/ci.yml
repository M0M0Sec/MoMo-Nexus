name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Python backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Tests
        run: pytest -q  # hard gate

      - name: Lint
        run: ruff check src tests  # clean as of Faz 6.1 — hard gate

      - name: Type check
        continue-on-error: true  # strict=true declared but ~185 errors; migrate in Faz 6.2
        run: mypy src/nexus

  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit  # hard gate — dashboard is type-clean

      - name: Lint
        continue-on-error: true
        run: npm run lint
